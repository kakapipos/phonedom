<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foot Worship App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            background-color: #000; color: #fff; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh;
        }
        #fetish-img {
            width: 95vw; height: 50vh; object-fit: contain;
            border: 4px solid #ff0000; margin-top: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.7);
        }
        .btn-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            width: 90%; margin-top: 20px;
        }
        button {
            background: #111; color: #ff0000; border: 2px solid #ff0000;
            padding: 20px 5px; font-weight: bold; text-transform: uppercase;
        }
        #panic-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ff0000; z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .flash { animation: bg-flash 0.2s infinite; }
        @keyframes bg-flash { 0% { background: #000; } 50% { background: #ff0000; } }
    </style>
</head>
<body id="main-body">

    <h2 id="status" style="color:red; margin-top:10px;">SYSTEM: CAPTIVE</h2>
    <img id="fetish-img" src="feet1.png">

    <div class="btn-grid">
        <button id="btn-lock">1. LOCK DEVICE</button>
        <button id="btn-outburst">2. PUBLIC OUTBURST</button>
        <button id="btn-vibrate">3. STINGING EDGES</button>
        <button id="btn-wa">4. WHATSAPP RUIN</button>
        <button id="btn-cycle">5. CYCLE (10S)</button>
        <button id="btn-shame">6. SHAME MODE</button>
    </div>

    <div id="panic-overlay">
        <h1 style="color: black; font-size: 3rem;">DO NOT CLOSE.</h1>
        <img src="feet1.png" id="panic-img" style="width: 80%;">
    </div>

    <video id="spycam" autoplay playsinline muted style="display:none;"></video>
    <script src="app.js"></script>
</body>
</html>
